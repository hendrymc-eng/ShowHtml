<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应用中心 · UmakeX</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/im.css">
  <style>
    .ai-agent-section {
      background: linear-gradient(135deg, #fff5f3, #fef3e8);
      border: 1px solid #ffcdd2;
      border-radius: 12px;
      margin: 12px 16px;
      padding: 16px;
      position: relative;
      cursor: pointer;
    }
    .ai-agent-section .badge {
      position: absolute; top: -8px; left: 12px;
      background: var(--accent-red); color: #fff;
      font-family: var(--font-mono);
      font-size: 9px; padding: 3px 6px;
      border-radius: 3px; font-weight: 700;
      letter-spacing: 0.05em;
    }
    .ai-agent-section h2 {
      font-size: 18px; font-weight: 700;
      color: var(--ink);
      margin: 6px 0;
    }
    .ai-agent-section .desc {
      font-size: 12px; color: var(--ink-2);
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .ai-agent-section .agents-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .ai-agent-section .agent-pill {
      padding: 8px 4px;
      background: #fff;
      border-radius: 8px;
      text-align: center;
      font-size: 11px;
      border: 1px solid #ffcdd2;
    }
    .ai-agent-section .agent-pill .ico {
      display: block; font-size: 22px; margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div>
      <a href="profile.html" class="page-back">‹</a>
      <span class="page-title">应用中心</span>
    </div>
    <span class="kicker">APPS</span>
  </header>

  <!-- AI Agent 中心（大卡片，NEW 角标） -->
  <a href="agent-center.html" class="ai-agent-section">
    <div class="badge">NEW</div>
    <h2>🤖 AI Agent 中心</h2>
    <div class="desc">企业 AI 助理 · 7×24 在线<br>客服 / 销冠 / 会议 三位一体</div>
    <div class="agents-row">
      <div class="agent-pill">
        <span class="ico">🎧</span>
        智能客服
      </div>
      <div class="agent-pill">
        <span class="ico">💼</span>
        AI 销冠
      </div>
      <div class="agent-pill">
        <span class="ico">📋</span>
        会议助手
      </div>
    </div>
  </a>

  <!-- 工具类 -->
  <div class="profile-section">
    <div class="profile-section-title">工具</div>
    <div class="app-grid">
      <div class="app-item">
        <div class="app-icon">📁</div>
        <div class="app-name">文件</div>
      </div>
      <div class="app-item">
        <div class="app-icon purple">📊</div>
        <div class="app-name">报表</div>
      </div>
      <div class="app-item">
        <div class="app-icon amber">📅</div>
        <div class="app-name">日历</div>
      </div>
      <div class="app-item">
        <div class="app-icon green">✅</div>
        <div class="app-name">任务</div>
      </div>
      <div class="app-item">
        <div class="app-icon purple">📝</div>
        <div class="app-name">笔记</div>
      </div>
      <div class="app-item">
        <div class="app-icon">🎨</div>
        <div class="app-name">设计</div>
      </div>
      <div class="app-item">
        <div class="app-icon green">💼</div>
        <div class="app-name">CRM</div>
      </div>
      <div class="app-item">
        <div class="app-icon amber">📞</div>
        <div class="app-name">电话</div>
      </div>
    </div>
  </div>

  <!-- 办公类 -->
  <div class="profile-section">
    <div class="profile-section-title">办公</div>
    <div class="app-grid">
      <div class="app-item">
        <div class="app-icon">📋</div>
        <div class="app-name">审批</div>
      </div>
      <div class="app-item">
        <div class="app-icon purple">📑</div>
        <div class="app-name">合同</div>
      </div>
      <div class="app-item">
        <div class="app-icon amber">💰</div>
        <div class="app-name">报销</div>
      </div>
      <div class="app-item">
        <div class="app-icon green">🛒</div>
        <div class="app-name">商城</div>
      </div>
    </div>
  </div>

  <!-- 4 tab 底栏 -->
  <nav class="tabbar">
    <a href="chat-list.html" class="tabbar-item"><div class="tab-icon">💬</div>消息</a>
    <a href="contact.html" class="tabbar-item"><div class="tab-icon">📒</div>通讯录</a>
    <a href="meeting-list.html" class="tabbar-item"><div class="tab-icon">📅</div>会议</a>
    <a href="profile.html" class="tabbar-item active"><div class="tab-icon">👤</div>我的</a>
  </nav>

</body>
</html>
