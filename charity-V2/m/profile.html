<style>
  /* profile hero */
  .h5-profile-hero {
    padding: 56px 16px 28px;
    color: #fff;
    background: linear-gradient(135deg, var(--h5-primary) 0%, var(--h5-primary-deep) 100%);
    position: relative;
  }
  .h5-profile-hero::before {
    content: "";
    position: absolute; top: -40px; right: -20px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .h5-profile-hero::after {
    content: "";
    position: absolute; bottom: -20px; left: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .h5-profile-info {
    display: flex; align-items: center; gap: 14px;
    position: relative;
  }
  .h5-profile-info .av {
    width: 64px; height: 64px;
    border-radius: 32px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700;
    flex-shrink: 0;
  }
  .h5-profile-info .body { flex: 1; min-width: 0; }
  .h5-profile-info .name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .h5-profile-info .sub { font-size: 12px; opacity: 0.85; }
  .h5-profile-info .edit {
    width: 32px; height: 32px;
    border-radius: 16px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    cursor: pointer;
  }

  /* 数据 strip */
  .h5-stats-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 14px 0;
    margin: 16px 0 0;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .h5-stats-strip .it {
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.2);
  }
  .h5-stats-strip .it:last-child { border-right: 0; }
  .h5-stats-strip .v { font-size: 18px; font-weight: 700; }
  .h5-stats-strip .l { font-size: 10px; opacity: 0.85; margin-top: 2px; }

  /* 菜单卡 */
  .h5-menu-card {
    background: var(--h5-card);
    border-radius: 14px;
    margin: 12px 16px 0;
    padding: 0 14px;
  }
  .h5-menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--h5-divider);
  }
  .h5-menu-item:last-child { border-bottom: 0; }
  .h5-menu-item .ic {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .h5-menu-item .body { flex: 1; min-width: 0; }
  .h5-menu-item .t { font-size: 14px; font-weight: 500; }
  .h5-menu-item .d { font-size: 11px; color: var(--h5-text-3); margin-top: 2px; }
  .h5-menu-item .r { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--h5-text-3); }
  .h5-menu-item .red { color: var(--h5-danger); }
  .h5-menu-item .arrow { font-size: 18px; color: var(--h5-text-3); }

  /* 切角色按钮 */
  .h5-role-switcher {
    margin: 12px 16px 0;
    background: var(--h5-card);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .h5-role-switcher .body { flex: 1; }
  .h5-role-switcher .t { font-size: 13px; font-weight: 500; }
  .h5-role-switcher .d { font-size: 11px; color: var(--h5-text-3); margin-top: 2px; }
</style>

<script>
// ===== 通用 GSAP 入场动画（按页面元素自动选择）=====
(function() {
  if (window.__h5GsapInit) return;
  window.__h5GsapInit = true;
  if (!window.gsap) return;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const $ = function(s, ctx) { return Array.from((ctx || document).querySelectorAll(s)); };

  // 1) App Header 顶部滑入
  var header = document.querySelector('.h5-app-header');
  if (header) {
    gsap.fromTo(header, { y: -12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.1, ease: 'power2.out' });
  }

  // 2) Impact Hero 淡入
  var hero = document.querySelector('.h5-impact-hero');
  if (hero) {
    gsap.fromTo(hero, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, delay: 0.2, ease: 'power2.out' });
  }

  // 3) Counter 数字滚动
  $('.counter').forEach(function(el, i) {
    var t = parseFloat(el.dataset.target);
    if (isNaN(t)) return;
    var obj = { v: 0 };
    gsap.to(obj, {
      v: t, duration: 1.4, delay: 0.4 + i * 0.1, ease: 'power2.out',
      onUpdate: function() {
        el.textContent = Number.isInteger(t)
          ? Math.round(obj.v).toLocaleString()
          : obj.v.toFixed(2);
      }
    });
  });

  // 4) 柱状图
  $('.h5-rpt-bar[data-h]').forEach(function(el, i) {
    var h = el.dataset.h;
    gsap.set(el, { height: '0%' });
    gsap.to(el, { height: h + '%', duration: 0.8, delay: 0.6 + i * 0.05, ease: 'power3.out' });
  });

  // 5) 进度条
  $('[data-fill]').forEach(function(el, i) {
    if (el.classList.contains('h5-rpt-bar')) return;
    var w = el.dataset.fill;
    if (!w) return;
    gsap.set(el, { width: '0%' });
    gsap.to(el, { width: w + (w.includes('%') ? '' : '%'), duration: 1, delay: 0.5 + i * 0.05, ease: 'power2.out' });
  });

  // 6) 列表/卡片 stagger
  var staggerItems = [].concat(
    $('.h5-list-item'),
    $('.h5-feature-row'),
    $('.h5-app-card'),
    $('.h5-h-card'),
    $('.h5-quick-action'),
    $('.h5-section-title'),
    $('.h5-section-divider')
  );
  if (staggerItems.length) {
    gsap.fromTo(staggerItems, { y: 10, opacity: 0 }, {
      y: 0, opacity: 1, duration: 0.4, stagger: 0.04, delay: 0.5, ease: 'power2.out'
    });
  }

  // 7) FAB 弹性入场
  var fab = document.querySelector('.h5-fab');
  if (fab) {
    gsap.fromTo(fab, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, delay: 0.7, ease: 'back.out(1.7)' });
  }

  // 8) Chips 弹性入场
  var chips = $('.h5-chip');
  if (chips.length && chips.length <= 10) {
    gsap.fromTo(chips, { scale: 0.9, opacity: 0 }, {
      scale: 1, opacity: 1, duration: 0.3, stagger: 0.04, delay: 0.3, ease: 'back.out(2)'
    });
  }
})();
</script>
