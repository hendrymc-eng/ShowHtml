<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>注册 · 慈商联营</title>
<link rel="stylesheet" href="./public/css/h5.css">
<link rel="stylesheet" href="./public/css/h5-app.css">
<style>
  body { background: #fff; }
  .h5-auth-wrap { min-height: 100vh; padding: 16px 24px 40px; display: flex; flex-direction: column; }
  .h5-nav-row { display: flex; align-items: center; height: 44px; }
  .h5-nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .h5-nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; }
  .h5-nav-spacer { width: 32px; }
  .h5-progress-bar-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0 24px;
  }
  .h5-step {
    flex: 1; height: 4px; background: var(--h5-divider); border-radius: 2px; position: relative;
  }
  .h5-step.done { background: var(--h5-primary); }
  .h5-step-num {
    position: absolute; top: -22px; left: 0;
    width: 20px; height: 20px;
    border-radius: 10px;
    background: var(--h5-divider);
    color: var(--h5-text-3);
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .h5-step.done .h5-step-num { background: var(--h5-primary); color: #fff; }
  .h5-step-label {
    font-size: 11px;
    color: var(--h5-text-3);
    text-align: center;
    margin-top: 6px;
  }
  .h5-step.done + .h5-step-label { color: var(--h5-primary); font-weight: 600; }
  .h5-form-title {
    font-size: 22px; font-weight: 700;
    margin-bottom: 4px;
  }
  .h5-form-sub {
    font-size: 13px; color: var(--h5-text-3);
    margin-bottom: 24px;
  }
  .h5-input-icon { position: relative; }
  .h5-input-icon .h5-input { padding-left: 40px; }
  .h5-input-icon .ic {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--h5-text-3);
    font-size: 18px;
  }
  .h5-input-extra {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--h5-primary);
    font-size: 13px; font-weight: 500;
  }
  .h5-protocol {
    display: flex; align-items: flex-start; gap: 8px;
    margin: 8px 0 24px;
    font-size: 12px; color: var(--h5-text-2);
    line-height: 1.5;
  }
  .h5-protocol input { margin-top: 2px; width: 14px; height: 14px; accent-color: var(--h5-primary); flex-shrink: 0; }
  .h5-protocol a { color: var(--h5-primary); }
  .h5-role-grid-mini {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .h5-role-mini {
    padding: 14px 8px;
    background: var(--h5-bg);
    border-radius: 12px;
    text-align: center;
    border: 1.5px solid transparent;
    transition: all 0.2s;
  }
  .h5-role-mini.active {
    background: var(--h5-primary-soft);
    border-color: var(--h5-primary);
  }
  .h5-role-mini .ic { font-size: 24px; margin-bottom: 4px; }
  .h5-role-mini .name { font-size: 12px; font-weight: 600; }
  .h5-sms-row {
    display: flex; gap: 8px;
  }
  .h5-sms-row .h5-input-icon { flex: 1; }
  .h5-sms-row .h5-btn-sms {
    flex-shrink: 0;
    padding: 0 16px;
    background: var(--h5-primary-soft);
    color: var(--h5-primary);
    border-radius: var(--h5-radius-sm);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center;
  }
  .h5-sms-row .h5-btn-sms.disabled {
    background: var(--h5-divider);
    color: var(--h5-text-3);
  }
</style>
</head>
<body class="has-status-bar">

<!-- App 状态栏 -->
<div class="h5-status-bar light">
  <span class="time" id="statusTime">9:41</span>
  <span class="right">📶 🔋</span>
</div>

<!-- App Header (sticky large title) -->
<div class="h5-app-header">
  <div class="row">
    <span class="greet">创建账户</span>
    <div class="actions"></div>
  </div>
  <div class="large-title">注册</div>
</div>

<div class="h5-auth-wrap">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="./public/js/h5.js"></script>
<script>
  let smsTimer = null;

  // 角色选择
  document.querySelectorAll('#roleGrid .h5-role-mini').forEach(r => {
    r.addEventListener('click', () => {
      document.querySelectorAll('#roleGrid .h5-role-mini').forEach(x => x.classList.remove('active'));
      r.classList.add('active');
      H5.setRole(r.dataset.role);
    });
  });

  function sendSms() {
    const phone = document.getElementById('phone').value;
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      alert('请输入正确的手机号');
      return;
    }
    const btn = document.getElementById('smsBtn');
    btn.classList.add('disabled');
    let s = 60;
    btn.textContent = s + 's 后重发';
    smsTimer = setInterval(() => {
      s--;
      if (s <= 0) {
        clearInterval(smsTimer);
        btn.classList.remove('disabled');
        btn.textContent = '获取验证码';
      } else {
        btn.textContent = s + 's 后重发';
      }
    }, 1000);
  }

  function nextStep() {
    // 原型：直接切到 step 2，不验证
    document.getElementById('step2').classList.add('done');
    if (window.gsap) {
      gsap.to('#step1Panel', { x: -30, opacity: 0, duration: 0.3, onComplete: () => {
        document.getElementById('step1Panel').style.display = 'none';
        const p = document.getElementById('step2Panel');
        p.style.display = '';
        document.getElementById('step1Action').style.display = 'none';
        document.getElementById('step2Action').style.display = '';
        gsap.fromTo(p, { x: 30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
      }});
    } else {
      document.getElementById('step1Panel').style.display = 'none';
      document.getElementById('step2Panel').style.display = '';
      document.getElementById('step1Action').style.display = 'none';
      document.getElementById('step2Action').style.display = '';
    }
  }

  function goBack() {
    if (window.gsap) {
      gsap.to('#step2Panel', { x: 30, opacity: 0, duration: 0.3, onComplete: () => {
        document.getElementById('step2Panel').style.display = 'none';
        const p = document.getElementById('step1Panel');
        p.style.display = '';
        document.getElementById('step2Action').style.display = 'none';
        document.getElementById('step1Action').style.display = '';
        document.getElementById('step2').classList.remove('done');
        gsap.fromTo(p, { x: -30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
      }});
    } else {
      document.getElementById('step2Panel').style.display = 'none';
      document.getElementById('step1Panel').style.display = '';
      document.getElementById('step2Action').style.display = 'none';
      document.getElementById('step1Action').style.display = '';
    }
  }

  function doRegister() {
    // 原型：直接跳 dashboard，不验证
    H5.setRole(H5.currentRole);
    location.href = `./${H5.currentRole}/dashboard.html?role=${H5.currentRole}`;
  }

  // 入场动效
  H5.fadeInUp('.h5-progress-bar-row, #step1Panel > *', {
    y: 16, opacity: 0, duration: 0.5, stagger: 0.06
  });
</script>

<script>
// ===== 通用 GSAP 入场动画（按页面元素自动选择）=====
(function() {
  if (window.__h5GsapInit) return;
  window.__h5GsapInit = true;
  if (!window.gsap) return;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const $ = function(s, ctx) { return Array.from((ctx || document).querySelectorAll(s)); };

  // 1) App Header 顶部滑入
  var header = document.querySelector('.h5-app-header');
  if (header) {
    gsap.fromTo(header, { y: -12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.1, ease: 'power2.out' });
  }

  // 2) Impact Hero 淡入
  var hero = document.querySelector('.h5-impact-hero');
  if (hero) {
    gsap.fromTo(hero, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, delay: 0.2, ease: 'power2.out' });
  }

  // 3) Counter 数字滚动
  $('.counter').forEach(function(el, i) {
    var t = parseFloat(el.dataset.target);
    if (isNaN(t)) return;
    var obj = { v: 0 };
    gsap.to(obj, {
      v: t, duration: 1.4, delay: 0.4 + i * 0.1, ease: 'power2.out',
      onUpdate: function() {
        el.textContent = Number.isInteger(t)
          ? Math.round(obj.v).toLocaleString()
          : obj.v.toFixed(2);
      }
    });
  });

  // 4) 柱状图
  $('.h5-rpt-bar[data-h]').forEach(function(el, i) {
    var h = el.dataset.h;
    gsap.set(el, { height: '0%' });
    gsap.to(el, { height: h + '%', duration: 0.8, delay: 0.6 + i * 0.05, ease: 'power3.out' });
  });

  // 5) 进度条
  $('[data-fill]').forEach(function(el, i) {
    if (el.classList.contains('h5-rpt-bar')) return;
    var w = el.dataset.fill;
    if (!w) return;
    gsap.set(el, { width: '0%' });
    gsap.to(el, { width: w + (w.includes('%') ? '' : '%'), duration: 1, delay: 0.5 + i * 0.05, ease: 'power2.out' });
  });

  // 6) 列表/卡片 stagger
  var staggerItems = [].concat(
    $('.h5-list-item'),
    $('.h5-feature-row'),
    $('.h5-app-card'),
    $('.h5-h-card'),
    $('.h5-quick-action'),
    $('.h5-section-title'),
    $('.h5-section-divider')
  );
  if (staggerItems.length) {
    gsap.fromTo(staggerItems, { y: 10, opacity: 0 }, {
      y: 0, opacity: 1, duration: 0.4, stagger: 0.04, delay: 0.5, ease: 'power2.out'
    });
  }

  // 7) FAB 弹性入场
  var fab = document.querySelector('.h5-fab');
  if (fab) {
    gsap.fromTo(fab, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, delay: 0.7, ease: 'back.out(1.7)' });
  }

  // 8) Chips 弹性入场
  var chips = $('.h5-chip');
  if (chips.length && chips.length <= 10) {
    gsap.fromTo(chips, { scale: 0.9, opacity: 0 }, {
      scale: 1, opacity: 1, duration: 0.3, stagger: 0.04, delay: 0.3, ease: 'back.out(2)'
    });
  }
})();
</script>

</body>
</html>
