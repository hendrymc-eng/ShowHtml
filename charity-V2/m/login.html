<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>登录 · 慈商联营</title>
<link rel="stylesheet" href="./public/css/h5.css">
<link rel="stylesheet" href="./public/css/h5-app.css">
<style>
  body { background: #fff; }
  .h5-auth-wrap {
    min-height: 100vh;
    padding: 24px 24px 40px;
    display: flex; flex-direction: column;
  }
  .h5-auth-logo {
    width: 64px; height: 64px;
    margin: 32px 0 24px;
  }
  .h5-auth-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--h5-text);
    margin-bottom: 6px;
  }
  .h5-auth-sub {
    font-size: 14px;
    color: var(--h5-text-3);
    margin-bottom: 32px;
  }
  .h5-role-switch {
    display: flex; gap: 8px;
    margin-bottom: 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .h5-role-pill {
    flex-shrink: 0;
    padding: 8px 16px;
    background: var(--h5-bg);
    color: var(--h5-text-2);
    border-radius: var(--h5-radius-pill);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .h5-role-pill.active {
    background: var(--h5-primary);
    color: #fff;
  }
  .h5-input-icon {
    position: relative;
  }
  .h5-input-icon .h5-input {
    padding-left: 40px;
  }
  .h5-input-icon .ic {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--h5-text-3);
    font-size: 18px;
    pointer-events: none;
  }
  .h5-input-extra {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--h5-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .h5-remember {
    display: flex; align-items: center; justify-content: space-between;
    margin: 8px 0 24px;
    font-size: 13px;
    color: var(--h5-text-2);
  }
  .h5-checkbox {
    display: flex; align-items: center; gap: 6px;
  }
  .h5-checkbox input { width: 16px; height: 16px; accent-color: var(--h5-primary); }
  .h5-forgot { color: var(--h5-primary); }
  .h5-divider {
    display: flex; align-items: center;
    margin: 32px 0 16px;
    color: var(--h5-text-3);
    font-size: 12px;
  }
  .h5-divider::before, .h5-divider::after {
    content: "";
    flex: 1; height: 1px;
    background: var(--h5-divider);
  }
  .h5-divider span { padding: 0 12px; }
  .h5-third-party {
    display: flex; justify-content: center; gap: 32px;
  }
  .h5-third-party .item {
    width: 44px; height: 44px;
    background: var(--h5-bg);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: transform 0.15s;
  }
  .h5-third-party .item:active { transform: scale(0.92); }
  .h5-register-link {
    text-align: center;
    margin-top: auto;
    padding-top: 32px;
    font-size: 14px;
    color: var(--h5-text-3);
  }
  .h5-register-link a { color: var(--h5-primary); font-weight: 600; }
</style>
</head>
<body class="has-status-bar">

<!-- App 状态栏 -->
<div class="h5-status-bar light">
  <span class="time" id="statusTime">9:41</span>
  <span class="right">📶 🔋</span>
</div>

<!-- App Header (sticky large title) -->
<div class="h5-app-header">
  <div class="row">
    <span class="greet">欢迎回来</span>
    <div class="actions"></div>
  </div>
  <div class="large-title">登录</div>
</div>

<div class="h5-auth-wrap">
  <div class="h5-auth-logo" id="authLogo"></div>
  <div class="h5-auth-title">欢迎回来</div>
  <div class="h5-auth-sub">登录后开启您的公益之旅</div>

  <!-- 角色快速切换 -->
  <div class="h5-role-switch" id="roleSwitch">
    <div class="h5-role-pill active" data-role="volunteer">🙋 志愿者</div>
    <div class="h5-role-pill" data-role="recipient">❤️ 受捐者</div>
    <div class="h5-role-pill" data-role="company">🏢 企业</div>
    <div class="h5-role-pill" data-role="charity">慈 慈善会</div>
    <div class="h5-role-pill" data-role="org">社 社会组织</div>
  </div>

  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="h5-form-group">
      <div class="h5-input-icon">
        <span class="ic">📱</span>
        <input type="tel" class="h5-input" id="phone" placeholder="请输入手机号" maxlength="11" required>
      </div>
    </div>
    <div class="h5-form-group">
      <div class="h5-input-icon">
        <span class="ic">🔒</span>
        <input type="password" class="h5-input" id="password" placeholder="请输入密码" required>
        <span class="h5-input-extra" onclick="togglePwd()">显示</span>
      </div>
    </div>

    <div class="h5-remember">
      <label class="h5-checkbox">
        <input type="checkbox" checked> 7 天内自动登录
      </label>
      <a href="#" class="h5-forgot">忘记密码？</a>
    </div>

    <div style="height: 100px;"></div>
  </form>

  <!-- 登录按钮 fixed bottom -->
  <div class="h5-bottom-action">
    <button type="submit" class="h5-btn h5-btn-primary h5-btn-block h5-btn-lg" id="loginBtn" onclick="doLogin(event)">登 录</button>
  </div>

  <div class="h5-divider"><span>其他登录方式</span></div>
  <div class="h5-third-party">
    <div class="item" title="微信">💬</div>
    <div class="item" title="支付宝">💰</div>
    <div class="item" title="Apple">🍎</div>
  </div>

  <div class="h5-register-link">
    还没账号？<a href="./register.html">立即注册</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="./public/js/h5.js"></script>
<script>
  document.getElementById('authLogo').innerHTML = H5.LOGO_SVG;

  // 角色切换
  document.querySelectorAll('#roleSwitch .h5-role-pill').forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll('#roleSwitch .h5-role-pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      H5.setRole(p.dataset.role);
    });
  });

  // 默认角色
  H5.setRole(H5.currentRole);

  // 切换密码显示
  function togglePwd() {
    const el = document.getElementById('password');
    const ev = event.target;
    if (el.type === 'password') { el.type = 'text'; ev.textContent = '隐藏'; }
    else { el.type = 'password'; ev.textContent = '显示'; }
  }

  // 登录（原型：直接跳转，不验证表单）
  function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = '登录中...';
    btn.disabled = true;
    setTimeout(() => {
      H5.setRole(H5.currentRole);
      location.href = `./${H5.currentRole}/dashboard.html?role=${H5.currentRole}`;
    }, 400);
    return false;
  }

  // 入场动效
  H5.fadeInUp('.h5-auth-logo, .h5-auth-title, .h5-auth-sub, .h5-role-switch, #loginForm, .h5-divider, .h5-third-party', {
    y: 20, opacity: 0, duration: 0.5, stagger: 0.08
  });
</script>

<script>
// ===== 通用 GSAP 入场动画（按页面元素自动选择）=====
(function() {
  if (window.__h5GsapInit) return;
  window.__h5GsapInit = true;
  if (!window.gsap) return;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const $ = function(s, ctx) { return Array.from((ctx || document).querySelectorAll(s)); };

  // 1) App Header 顶部滑入
  var header = document.querySelector('.h5-app-header');
  if (header) {
    gsap.fromTo(header, { y: -12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.1, ease: 'power2.out' });
  }

  // 2) Impact Hero 淡入
  var hero = document.querySelector('.h5-impact-hero');
  if (hero) {
    gsap.fromTo(hero, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, delay: 0.2, ease: 'power2.out' });
  }

  // 3) Counter 数字滚动
  $('.counter').forEach(function(el, i) {
    var t = parseFloat(el.dataset.target);
    if (isNaN(t)) return;
    var obj = { v: 0 };
    gsap.to(obj, {
      v: t, duration: 1.4, delay: 0.4 + i * 0.1, ease: 'power2.out',
      onUpdate: function() {
        el.textContent = Number.isInteger(t)
          ? Math.round(obj.v).toLocaleString()
          : obj.v.toFixed(2);
      }
    });
  });

  // 4) 柱状图
  $('.h5-rpt-bar[data-h]').forEach(function(el, i) {
    var h = el.dataset.h;
    gsap.set(el, { height: '0%' });
    gsap.to(el, { height: h + '%', duration: 0.8, delay: 0.6 + i * 0.05, ease: 'power3.out' });
  });

  // 5) 进度条
  $('[data-fill]').forEach(function(el, i) {
    if (el.classList.contains('h5-rpt-bar')) return;
    var w = el.dataset.fill;
    if (!w) return;
    gsap.set(el, { width: '0%' });
    gsap.to(el, { width: w + (w.includes('%') ? '' : '%'), duration: 1, delay: 0.5 + i * 0.05, ease: 'power2.out' });
  });

  // 6) 列表/卡片 stagger
  var staggerItems = [].concat(
    $('.h5-list-item'),
    $('.h5-feature-row'),
    $('.h5-app-card'),
    $('.h5-h-card'),
    $('.h5-quick-action'),
    $('.h5-section-title'),
    $('.h5-section-divider')
  );
  if (staggerItems.length) {
    gsap.fromTo(staggerItems, { y: 10, opacity: 0 }, {
      y: 0, opacity: 1, duration: 0.4, stagger: 0.04, delay: 0.5, ease: 'power2.out'
    });
  }

  // 7) FAB 弹性入场
  var fab = document.querySelector('.h5-fab');
  if (fab) {
    gsap.fromTo(fab, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, delay: 0.7, ease: 'back.out(1.7)' });
  }

  // 8) Chips 弹性入场
  var chips = $('.h5-chip');
  if (chips.length && chips.length <= 10) {
    gsap.fromTo(chips, { scale: 0.9, opacity: 0 }, {
      scale: 1, opacity: 1, duration: 0.3, stagger: 0.04, delay: 0.3, ease: 'back.out(2)'
    });
  }
})();
</script>

</body>
</html>
