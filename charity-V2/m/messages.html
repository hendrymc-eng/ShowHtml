<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>消息中心 · 慈商联营</title>
<link rel="stylesheet" href="public/css/h5.css">
<link rel="stylesheet" href="public/css/h5-app.css">
<style>
  .h5-msg-tabs {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--h5-card);
    border-bottom: 1px solid var(--h5-divider);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .h5-msg-tabs::-webkit-scrollbar { display: none; }
  .h5-msg-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--h5-text-2);
    background: var(--h5-bg);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .h5-msg-tab.active {
    background: var(--h5-primary);
    color: #fff;
    font-weight: 600;
  }
  .h5-msg-tab .cnt {
    margin-left: 4px;
    font-size: 11px;
    opacity: 0.7;
  }
  .h5-msg-banner {
    margin: 12px 16px 0;
    padding: 14px;
    background: linear-gradient(135deg, var(--h5-primary) 0%, var(--h5-primary-deep) 100%);
    color: #fff;
    border-radius: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .h5-msg-banner .ic { font-size: 28px; }
  .h5-msg-banner .body { flex: 1; }
  .h5-msg-banner .t { font-size: 14px; font-weight: 600; }
  .h5-msg-banner .d { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .h5-msg-banner .arrow { font-size: 18px; opacity: 0.7; }
</style>
</head>
<body data-role="company" class="has-tabbar has-status-bar">

<!-- App 状态栏（44px 顶部时间+信号） -->
<div class="h5-status-bar light">
  <span class="time" id="statusTime">9:41</span>
  <span class="right">📶 🔋</span>
</div>

<div class="h5-page" id="mainContentBody">

  <!-- App Header -->
  <div class="h5-app-header">
    <div class="row">
      <span class="greet" id="roleGreet">企业工作台</span>
      <div class="actions">
        <button class="icon-btn" onclick="openMarkAll()" aria-label="全部已读">✓</button>
      </div>
    </div>
    <div class="large-title">消息</div>
  </div>

  <!-- Filter chips (replaces old tabs) -->
  <div class="h5-chips">
    <button class="h5-chip active" data-tab="all" onclick="selectMsgTab(this)">全部 <span class="cnt" id="cntAll">5</span></button>
    <button class="h5-chip" data-tab="unread" onclick="selectMsgTab(this)">未读 <span class="cnt" id="cntUnread">3</span></button>
    <button class="h5-chip" data-tab="system" onclick="selectMsgTab(this)">系统 <span class="cnt">1</span></button>
    <button class="h5-chip" data-tab="task" onclick="selectMsgTab(this)">任务 <span class="cnt">2</span></button>
    <button class="h5-chip" data-tab="notice" onclick="selectMsgTab(this)">公告 <span class="cnt">1</span></button>
    <button class="h5-chip" data-tab="feedback" onclick="selectMsgTab(this)">反馈 <span class="cnt">1</span></button>
  </div>

  <!-- 消息列表容器 -->
  <div id="msgList"></div>

  <div style="height: 24px;"></div>
</div>

<!-- 底部 tab bar -->
<div class="h5-tabbar">
  <div class="h5-tab" onclick="location.href='index.html'"><div class="tab-ic">🏠</div><div class="tab-label">首页</div></div>
  <div class="h5-tab" onclick="location.href='mall.html'"><div class="tab-ic">🛒</div><div class="tab-label">商城</div></div>
  <div class="h5-tab" onclick="location.href='report.html'"><div class="tab-ic">📊</div><div class="tab-label">报告</div></div>
  <div class="h5-tab active" onclick="location.href='messages.html'"><div class="tab-ic" style="position:relative;">🔔<span class="tab-badge">3</span></div><div class="tab-label">消息</div></div>
  <div class="h5-tab" onclick="location.href='profile.html'"><div class="tab-ic">👤</div><div class="tab-label">我的</div></div>
</div>

<!-- 通用提示 modal -->
<div class="h5-modal-mask" id="tipModal">
  <div class="h5-modal">
    <div class="h5-modal-grabber"></div>
    <div class="h5-modal-head">
      <div class="title" id="tipTitle">提示</div>
      <div class="close" onclick="H5.closeModal('tipModal')">✕</div>
    </div>
    <div class="h5-modal-body" id="tipBody" style="padding:20px;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="public/js/h5.js"></script>
<script>

    recipient: { name: '受捐者中心', icon: '🎁', user: '李华', cls: 'theme-recipient' }

  // 5 角色消息数据
  const MESSAGES = {

      { t: '壹基金协同任务派发', m: '云南地震应急派发 5,000 件，需 3 名志愿者。', time: '1 小时前', unread: true, ic: '🤝', bg: 'rgba(14,90,111,0.1)', col: '#0E5A6F', type: 'task', actions: ['立即派发'] },
      { t: '5 月运营月报已生成', m: '本月 26 个项目，5,800 万元物资派发，0 损耗。', time: '今早 09:30', unread: true, ic: '📊', bg: 'rgba(14,90,111,0.1)', col: '#0E5A6F', type: 'system' },
      { t: '3 个新社会组织入驻申请', m: '深圳志愿者联合会 / 广州青年公益 / 珠海慈善义工 待审核。', time: '昨天 16:40', unread: false, ic: '🏢', bg: 'rgba(196,132,42,0.12)', col: '#C4842A', type: 'task', actions: ['查看', '批量处理'] },

      { t: '新奖章解锁：雷锋日志愿者', m: '恭喜！您的"雷锋日志愿者"奖章已解锁，可立即查看。', time: '06-01 10:00', unread: false, ic: '🎖', bg: 'rgba(245,158,11,0.12)', col: '#F59E0B', type: 'feedback', actions: ['查看奖章'] }
    ],

      { t: '受捐资格已通过审核', m: '您的受捐资格已通过审核，可正常领取物资。', time: '1 小时前', unread: true, ic: '✓', bg: 'rgba(20,184,166,0.12)', col: '#14B8A6', type: 'system' },
      { t: '您的反馈收到回复', m: '感谢您的反馈！运营团队已确认您的建议并改善。', time: '今早 09:30', unread: false, ic: '💬', bg: 'rgba(124,58,237,0.1)', col: '#7C3AED', type: 'feedback', actions: ['查看回复'] },
      { t: '端午粽子礼盒可领取', m: '6 月 15 日可领取端午粽子礼盒，已为您预约。', time: '昨天 14:00', unread: false, ic: '🍙', bg: 'rgba(245,158,11,0.12)', col: '#F59E0B', type: 'notice', actions: ['查看预约'] },
      { t: '您有 1 条未读通知', m: '平台更新了受捐者保护政策。', time: '06-01 10:00', unread: false, ic: '📣', bg: 'rgba(124,58,237,0.1)', col: '#7C3AED', type: 'notice' }
    ]
  };

  // 渲染消息列表
  function renderMsgList(tab) {
    const list = MESSAGES[role] || [];
    let filtered = list;
    if (tab === 'unread') filtered = list.filter(x => x.unread);
    else if (tab !== 'all') filtered = list.filter(x => x.type === tab);

    const unreadCnt = list.filter(x => x.unread).length;
    const totalCnt = list.length;
    document.getElementById('cntAll').textContent = totalCnt;
    document.getElementById('cntUnread').textContent = unreadCnt;
    document.title = `消息中心(${unreadCnt}) · 慈商联营`;

    const container = document.getElementById('msgList');
    if (!filtered.length) {
      container.innerHTML = `
        <div style="text-align:center;padding:80px 32px;color:var(--h5-text-3);">
          <div style="font-size:48px;margin-bottom:16px;">📭</div>
          <div style="font-size:14px;">暂无消息</div>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map((m, i) => `
      <a class="h5-list-item" data-i="${i}" style="${m.unread ? 'background: rgba(232,93,4,0.04);' : ''}">
        <div class="avatar" style="background:${m.bg};color:${m.col};">${m.ic}</div>
        <div class="body">
          <div class="title">${m.t}</div>
          <div class="meta">${m.m}</div>
          ${m.actions ? `<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">${m.actions.map(a =>
            `<span class="h5-tag" onclick="event.stopPropagation();openTip('${a}','${m.t}')">${a}</span>`
          ).join('')}</div>` : ''}
        </div>
        <div class="trailing"><span class="time-stamp">${m.time}</span></div>
      </a>
    `).join('');

    // 绑定点击
    container.querySelectorAll('.h5-list-item').forEach(el => {
      el.addEventListener('click', () => {
        const i = +el.dataset.i;
        const m = filtered[i];
        openTip('查看详情', m.t, m.m);
        // 标记已读
        el.classList.remove('unread');
        const idx = list.findIndex(x => x === m);
        if (idx >= 0) list[idx].unread = false;
      });
    });

    // 入场动画
    if (window.gsap) {
      gsap.fromTo('.h5-list-item',
        { x: 20, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, stagger: 0.05, ease: 'power2.out' }
      );
    }
  }

  function openMarkAll() {
    const list = MESSAGES[role] || [];
    let cnt = 0;
    list.forEach(m => { if (m.unread) { m.unread = false; cnt++; } });
    if (cnt === 0) {
      openTip('提示', '没有未读消息', '您已经处理完所有消息');
    } else {
      openTip('已全部已读', `已标记 ${cnt} 条消息为已读`, '所有消息已归档');
      setTimeout(() => renderMsgList(currentTab), 500);
    }
  }

  let currentTab = 'all';

  document.querySelectorAll('.h5-msg-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.h5-msg-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentTab = t.dataset.tab;
      renderMsgList(currentTab);
    });
  });

  function openTip(t, d, ext) {
    document.getElementById('tipTitle').textContent = t;
    document.getElementById('tipBody').innerHTML =
      `<div style="text-align:center;"><div style="font-size:48px;margin-bottom:12px;">${getMsgIcon(t)}</div>` +
      `<div style="font-size:15px;font-weight:600;margin-bottom:8px;">${d}</div>` +
      (ext ? `<div style="font-size:13px;color:var(--h5-text-3);line-height:1.7;">${ext}</div>` : '') +
      `<button class="h5-btn h5-btn-primary h5-btn-block h5-btn-lg" style="margin-top:20px;" onclick="H5.closeModal('tipModal')">知道了</button></div>`;
    H5.openModal('tipModal');
  }
  function getMsgIcon(t) {
    if (t.includes('全部已读')) return '✓';
    if (t.includes('审批')) return '🚨';
    if (t.includes('派发')) return '🚚';
    if (t.includes('响应')) return '🤝';
    if (t.includes('详情')) return '📋';
    if (t.includes('完成')) return '✅';
    if (t.includes('查看')) return '🔍';
    return '💡';
  }

  // 初始化（适配 app-header）
  const cfg = roleMap[role];
  const greet = document.querySelector('.h5-app-header .greet');
  if (greet) greet.textContent = `${cfg.name} · 欢迎回来，${cfg.user}`;
  const unreadCnt = (MESSAGES[role]||[]).filter(x => x.unread).length;
  const dot = document.querySelector('.h5-app-header .badge-dot');
  if (dot) dot.style.display = unreadCnt > 0 ? 'block' : 'none';

  renderMsgList('all');

  // 入场
  window.addEventListener('load', () => {
    if (!window.gsap) return;
    gsap.fromTo('.h5-msg-banner', { y: -10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: 'power2.out' });
    gsap.fromTo('.h5-msg-tabs', { y: -8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.1, ease: 'power2.out' });
  });
</script>

<script>
// ===== 通用 GSAP 入场动画（按页面元素自动选择）=====
(function() {
  if (window.__h5GsapInit) return;
  window.__h5GsapInit = true;
  if (!window.gsap) return;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const $ = function(s, ctx) { return Array.from((ctx || document).querySelectorAll(s)); };

  // 1) App Header 顶部滑入
  var header = document.querySelector('.h5-app-header');
  if (header) {
    gsap.fromTo(header, { y: -12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, delay: 0.1, ease: 'power2.out' });
  }

  // 2) Impact Hero 淡入
  var hero = document.querySelector('.h5-impact-hero');
  if (hero) {
    gsap.fromTo(hero, { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, delay: 0.2, ease: 'power2.out' });
  }

  // 3) Counter 数字滚动
  $('.counter').forEach(function(el, i) {
    var t = parseFloat(el.dataset.target);
    if (isNaN(t)) return;
    var obj = { v: 0 };
    gsap.to(obj, {
      v: t, duration: 1.4, delay: 0.4 + i * 0.1, ease: 'power2.out',
      onUpdate: function() {
        el.textContent = Number.isInteger(t)
          ? Math.round(obj.v).toLocaleString()
          : obj.v.toFixed(2);
      }
    });
  });

  // 4) 柱状图
  $('.h5-rpt-bar[data-h]').forEach(function(el, i) {
    var h = el.dataset.h;
    gsap.set(el, { height: '0%' });
    gsap.to(el, { height: h + '%', duration: 0.8, delay: 0.6 + i * 0.05, ease: 'power3.out' });
  });

  // 5) 进度条
  $('[data-fill]').forEach(function(el, i) {
    if (el.classList.contains('h5-rpt-bar')) return;
    var w = el.dataset.fill;
    if (!w) return;
    gsap.set(el, { width: '0%' });
    gsap.to(el, { width: w + (w.includes('%') ? '' : '%'), duration: 1, delay: 0.5 + i * 0.05, ease: 'power2.out' });
  });

  // 6) 列表/卡片 stagger
  var staggerItems = [].concat(
    $('.h5-list-item'),
    $('.h5-feature-row'),
    $('.h5-app-card'),
    $('.h5-h-card'),
    $('.h5-quick-action'),
    $('.h5-section-title'),
    $('.h5-section-divider')
  );
  if (staggerItems.length) {
    gsap.fromTo(staggerItems, { y: 10, opacity: 0 }, {
      y: 0, opacity: 1, duration: 0.4, stagger: 0.04, delay: 0.5, ease: 'power2.out'
    });
  }

  // 7) FAB 弹性入场
  var fab = document.querySelector('.h5-fab');
  if (fab) {
    gsap.fromTo(fab, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, delay: 0.7, ease: 'back.out(1.7)' });
  }

  // 8) Chips 弹性入场
  var chips = $('.h5-chip');
  if (chips.length && chips.length <= 10) {
    gsap.fromTo(chips, { scale: 0.9, opacity: 0 }, {
      scale: 1, opacity: 1, duration: 0.3, stagger: 0.04, delay: 0.3, ease: 'back.out(2)'
    });
  }
})();
</script>
