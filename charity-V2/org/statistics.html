<div id="site-header"></div>

      <div>
        <h1>📈 统计报告</h1>

      </div>
      <button class="btn btn-ghost">📥 导出报告</button>
    </div>

    <div class="dash-grid-4">
      <div class="dash-stat">
        <div class="ic-deco">📦</div>
        <div class="label">累计派发</div>
        <div class="value">82,600</div>
        <div class="trend">件</div>
      </div>
      <div class="dash-stat theme-trust">
        <div class="ic-deco">👥</div>
        <div class="label">受惠人次</div>
        <div class="value">42,860</div>
        <div class="trend">累计</div>
      </div>
      <div class="dash-stat theme-gold">
        <div class="ic-deco">📋</div>
        <div class="label">参与项目</div>
        <div class="value">28</div>
        <div class="trend">累计</div>
      </div>
      <div class="dash-stat theme-info">
        <div class="ic-deco">⏰</div>
        <div class="label">服务时长</div>
        <div class="value">1,860<span class="unit">h</span></div>
        <div class="trend">志愿者</div>
      </div>
    </div>
